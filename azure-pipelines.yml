trigger:
  - main

pool:
  vmImage: ubuntu-latest

stages:
  - stage: Build
    displayName: Build
    jobs:
      - job: backend
        displayName: Backend (Maven)
        steps:
          - task: JavaToolInstaller@0
            inputs:
              versionSpec: "21"
              jdkArchitectureOption: x64
              jdkSourceOption: PreInstalled
          - script: |
              cd backend
              mvn -q -DskipTests package
            displayName: Build backend

      - job: frontend
        displayName: Frontend (Next.js)
        steps:
          - task: NodeTool@0
            inputs:
              versionSpec: "20.x"
          - script: |
              cd frontend
              npm ci
              npm run build
            displayName: Build frontend

