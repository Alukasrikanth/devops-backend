apiVersion: apps/v1
kind: Deployment
metadata:
  name: banking-frontend
  labels:
    app: banking-frontend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: banking-frontend
  template:
    metadata:
      labels:
        app: banking-frontend
    spec:
      containers:
      - name: frontend
        image: banking-frontend:latest
        imagePullPolicy: Never
        ports:
        - containerPort: 3000
        env:
        - name: BACKEND_URL
          value: http://banking-backend:8081
---
apiVersion: v1
kind: Service
metadata:
  name: banking-frontend
spec:
  selector:
    app: banking-frontend
  ports:
    - name: http
      protocol: TCP
      port: 3000
      targetPort: 3000
