server:
  port: 8081

spring:
  application:
    name: payments-service
  datasource:
    url: jdbc:postgresql://localhost:5433/banking
    username: postgres
    password: postgres
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        jdbc:
          time_zone: UTC

  kafka:
    bootstrap-servers: localhost:9092

management:
  endpoints:
    web:
      exposure:
        include: health,info

app:
  kafka:
    topic:
      paymentAuthorized: payments.authorized.v1

